<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#7f9ed0" />

    <title>Multi-Building Indoor Wayfinder</title>
    <meta name="description" content="Multi-Building Indoor Wayfinder System" />
    <meta name="author" content="Abdullah Ahmed" />

    <meta property="og:title" content="Multi-Building Indoor Wayfinder System" />
    <meta property="og:description" content="Multi-Building Indoor Wayfinder System" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://multi-building-pathfinder.vercel.app/" />
    <meta property="og:image" content="https://multi-building-pathfinder.vercel.app/android-chrome-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Multi-Building Indoor Wayfinder System" />
    <meta name="twitter:description" content="Multi-Building Indoor Wayfinder System" />
    <meta name="twitter:image" content="https://multi-building-pathfinder.vercel.app/android-chrome-512x512.png" />
    <script>
      // Capture uncaught client errors to localStorage and show overlay for easier debugging during dev
      (function(){
        function showOverlay(msg) {
          try {
            let el = document.getElementById('dev-error-overlay');
            if (!el) {
              el = document.createElement('div');
              el.id = 'dev-error-overlay';
              el.style.position = 'fixed';
              el.style.zIndex = '999999';
              el.style.left = '12px';
              el.style.right = '12px';
              el.style.top = '12px';
              el.style.padding = '12px';
              el.style.background = 'rgba(255,255,255,0.98)';
              el.style.border = '2px solid #ef4444';
              el.style.borderRadius = '8px';
              el.style.boxShadow = '0 6px 30px rgba(2,6,23,0.3)';
              el.style.fontFamily = 'ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto';
              el.style.color = '#0f172a';
              el.style.maxHeight = '60vh';
              el.style.overflow = 'auto';
              document.body.appendChild(el);
            }
            el.textContent = msg;
          } catch (e) { /* ignore */ }
        }
        try {
          window.addEventListener('error', function (e) {
            const payload = {message: e.message, stack: e.error && e.error.stack ? e.error.stack : null, time: Date.now()};
            try { localStorage.setItem('lastClientError', JSON.stringify(payload)); } catch (e) {}
            try { showOverlay((payload.message || 'Error') + '\n' + (payload.stack || '')) } catch (e) {}
          });
          window.addEventListener('unhandledrejection', function (ev) {
            const payload = {message: ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason), stack: ev.reason && ev.reason.stack ? ev.reason.stack : null, time: Date.now()};
            try { localStorage.setItem('lastClientError', JSON.stringify(payload)); } catch (e) {}
            try { showOverlay((payload.message || 'Unhandled rejection') + '\n' + (payload.stack || '')) } catch (e) {}
          });
        } catch (e) {}
      })();
      // Fix 100vh on mobile (for dynamic address bar)
      function setVh() {
        document.documentElement.style.setProperty(
          "--vh",
          window.innerHeight * 0.01 + "px"
        );
      }
      window.addEventListener("resize", setVh);
      window.addEventListener("orientationchange", setVh);
      setVh();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
